name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the real branch head (not the merge commit) so we can
          # push auto-fix commits back to it.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff format and auto-fix
        run: |
          uv run ruff format .
          uv run ruff check --fix .

      - name: Commit ruff fixes
        # Only push back when we own the branch: direct pushes to main, or
        # PRs opened from branches in this repo (not external forks).
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply ruff auto-fix [skip ci]"
            git push
          fi

      - name: Ruff check
        run: uv run ruff check .

      - name: mypy type check
        run: uv run mypy custom_components/tfi_live

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Generate coverage badge
        run: |
          mkdir -p .github/badges
          uv run coverage json -o /tmp/coverage.json
          python3 - <<'EOF'
          import json

          with open("/tmp/coverage.json") as f:
              percent = json.load(f)["totals"]["percent_covered"]

          if percent >= 90:
              color = "brightgreen"
          elif percent >= 75:
              color = "yellow"
          else:
              color = "red"

          badge = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{percent:.0f}%",
              "color": color,
          }
          with open(".github/badges/coverage.json", "w") as f:
              json.dump(badge, f)
          EOF

      - name: Commit coverage badge
        # Only push back when we own the branch: direct pushes to main, or
        # PRs opened from branches in this repo (not external forks).
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- .github/badges/coverage.json; then
            git add .github/badges/coverage.json
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi

