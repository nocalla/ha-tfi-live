name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  determine-bump:
    name: Determine bump type
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      bump: ${{ steps.find.outputs.bump }}
    steps:
      - name: Find release label on the merged PR
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          labels=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].labels[].name // empty')
          bump=""
          while IFS= read -r label; do
            case "$label" in
              "release: major") bump="major" ;;
              "release: minor") bump="minor" ;;
              "release: patch") [ -z "$bump" ] && bump="patch" ;;
            esac
          done <<< "$labels"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"

  release:
    name: Release
    needs: [determine-bump]
    if: |
      always() && !cancelled() &&
      (github.event_name == 'workflow_dispatch' ||
       needs.determine-bump.outputs.bump != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUMP: ${{ inputs.bump || needs.determine-bump.outputs.bump }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Bump version
        id: bump
        run: |
          cat > /tmp/bump_version.py << 'EOF'
          import json
          import os
          import re

          bump = os.environ["BUMP"]

          with open("custom_components/tfi_live/manifest.json") as f:
              manifest = json.load(f)

          current = manifest["version"]
          major, minor, patch = map(int, current.split("."))

          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          manifest["version"] = new_version
          with open("custom_components/tfi_live/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          with open("pyproject.toml") as f:
              content = f.read()
          content = re.sub(
              r'^(version\s*=\s*")[^"]+(")',
              rf"\g<1>{new_version}\g<2>",
              content,
              flags=re.MULTILINE,
          )
          with open("pyproject.toml", "w") as f:
              f.write(content)

          tag = f"v{new_version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new_version}\n")
              f.write(f"tag={tag}\n")

          print(f"Bumped {current} -> {new_version}")
          EOF
          python3 /tmp/bump_version.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/tfi_live/manifest.json pyproject.toml
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin main
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Build integration zip
        run: |
          cd custom_components
          zip -r ../ha-tfi-live.zip tfi_live/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: ha-tfi-live.zip
          generate_release_notes: true
