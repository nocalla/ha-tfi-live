name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          cat > /tmp/bump_version.py << 'EOF'
          import json
          import os
          import re

          bump = os.environ["BUMP"]

          with open("custom_components/tfi_live/manifest.json") as f:
              manifest = json.load(f)

          current = manifest["version"]
          major, minor, patch = map(int, current.split("."))

          if bump == "major":
              major += 1; minor = 0; patch = 0
          elif bump == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          manifest["version"] = new_version
          with open("custom_components/tfi_live/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")

          with open("pyproject.toml") as f:
              content = f.read()
          content = re.sub(
              r'^(version\s*=\s*")[^"]+(")',
              rf"\g<1>{new_version}\g<2>",
              content,
              flags=re.MULTILINE,
          )
          with open("pyproject.toml", "w") as f:
              f.write(content)

          tag = f"v{new_version}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new_version}\n")
              f.write(f"tag={tag}\n")

          print(f"Bumped {current} -> {new_version}")
          EOF
          python3 /tmp/bump_version.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/tfi_live/manifest.json pyproject.toml
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin master
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Build integration zip
        run: |
          cd custom_components
          zip -r ../tfi_live.zip tfi_live/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: tfi_live.zip
          generate_release_notes: true
